# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Bookmark user api

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: --timeout=5m

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    - name: Build
      run: docker build -t api:${{ github.sha }} .
    - name: Test
      run: go test -v ./...
    - name: Push to ECR
      run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 643208662378.dkr.ecr.us-east-1.amazonaws.com
          docker push 643208662378.dkr.ecr.us-east-1.amazonaws.com/api:${{ github.sha }}
    - name: Upload artifacts to S3
      run: aws s3 cp ./build s3://user-api-artifacts-bucket/${{ github.sha }}/ --recursive
