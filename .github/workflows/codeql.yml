name: CodeQL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: go build ./...

      - uses: github/codeql-action/analyze@v3